<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayasurya | Reality Explained</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:#0b0b0f;
  color:white;
  overflow-x:hidden;
}

/* ================= LOADING SCREEN ================= */
#loader{
  position:fixed;
  inset:0;
  background:#0b0b0f;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.loader-circle{
  width:60px;
  height:60px;
  border:4px solid rgba(255,255,255,0.1);
  border-top:4px solid #c08457;
  border-radius:50%;
  animation:spin 1s linear infinite;
}

@keyframes spin{
  to{ transform:rotate(360deg); }
}

.loader-text{
  margin-top:15px;
  color:#aaa;
  font-size:14px;
  letter-spacing:1px;
}

/* ================= PARTICLES ================= */
canvas{
  position:fixed;
  top:0;
  left:0;
  z-index:-1;
}

/* ================= NAV ================= */
nav{
  position:sticky;
  top:0;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.1);
  z-index:10;
}

nav span{
  color:#c08457;
}

/* ================= HERO ================= */
.hero{
  height:420px;
  background:url('banner.png') center/cover no-repeat;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
}

/* ================= PROFILE ================= */
.profile{
  text-align:center;
  margin-top:-70px;
}

.profile img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.2);
}

h1{
  margin-top:10px;
}

/* ================= SUBSCRIBE BUTTON ================= */
.subscribe-btn{
  display:inline-flex;
  align-items:center;
  gap:8px;
  margin-top:10px;
  padding:10px 18px;
  background:#ff0000;
  color:white;
  text-decoration:none;
  border-radius:25px;
  font-weight:600;
  transition:0.3s;
}

.subscribe-btn:hover{
  transform:scale(1.05);
  background:#cc0000;
}

/* ================= SECTIONS ================= */
.section{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:18px;
  padding:25px;
  backdrop-filter:blur(12px);
}

/* ================= SOCIAL ================= */
.links{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:12px;
}

.links a{
  text-align:center;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:white;
  background:linear-gradient(145deg,#8b5e3c,#c08457);
  transition:0.3s;
}

.links a:hover{
  transform:translateY(-4px);
}

/* ================= VIDEO ================= */
iframe{
  width:100%;
  height:360px;
  border:none;
  border-radius:12px;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:30px;
  color:#777;
}

/* ================= ANIMATION ================= */
.fade{
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.fade.show{
  opacity:1;
  transform:translateY(0);
}

</style>
</head>

<body>

<!-- ================= LOADER ================= -->
<div id="loader">
  <div class="loader-circle"></div>
  <div class="loader-text">Loading Reality...</div>
</div>

<!-- ================= PARTICLES ================= -->
<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
  <h3>Jaya<span>surya</span></h3>
  <i class="fa-solid fa-bolt"></i>
</nav>

<!-- HERO -->
<div class="hero"></div>

<!-- PROFILE -->
<div class="profile">
  <img src="profile.webp" alt="">
  <h1>Jayasurya</h1>

  <!-- YOUTUBE SUBSCRIBE BUTTON -->
  <a class="subscribe-btn"
     href="https://www.youtube.com/@justjayasurya?sub_confirmation=1"
     target="_blank">
     <i class="fab fa-youtube"></i> Subscribe
  </a>

  <p style="color:#aaa;margin-top:8px;">Politics • Society • Reality Breakdown</p>
</div>

<!-- SOCIAL -->
<div class="section fade">
  <div class="card">
    <h2>Connect</h2>
    <div class="links">

      <a href="https://youtube.com/@justjayasurya"><i class="fab fa-youtube"></i> YouTube</a>
      <a href="https://instagram.com/justjayasurya"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://x.com/justjayasurya"><i class="fab fa-x-twitter"></i> X</a>
      <a href="https://t.me/JustjayasuryaOfficial"><i class="fab fa-telegram"></i> Telegram</a>

    </div>
  </div>
</div>

<!-- ABOUT -->
<div class="section fade">
  <div class="card">
    <h2>About</h2>
    <p style="color:#ccc;line-height:1.7;">
      I simplify politics and society. I decode real-world systems in a way anyone can understand.
    </p>
  </div>
</div>

<!-- VIDEO -->
<div class="section fade">
  <div class="card">
    <h2>Featured Video</h2>
    <iframe src="https://www.youtube.com/embed/oLZQYplu1Gg" allowfullscreen></iframe>
  </div>
</div>

<footer>
  © 2026 Jayasurya
</footer>

<!-- ================= SCRIPTS ================= -->
<script>

/* ===== LOADER REMOVE ===== */
window.addEventListener("load",()=>{
  setTimeout(()=>{
    document.getElementById("loader").style.display="none";
  },1200);
});

/* ===== SCROLL ANIMATION ===== */
const faders = document.querySelectorAll(".fade");

window.addEventListener("scroll",()=>{
  faders.forEach(el=>{
    const top = el.getBoundingClientRect().top;
    if(top < window.innerHeight - 100){
      el.classList.add("show");
    }
  });
});

/* ===== PARTICLES (GLOW STYLE) ===== */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let particles = [];

for(let i=0;i<60;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2+1,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<particles.length;i++){
    let p = particles[i];

    ctx.fillStyle="rgba(192,132,87,0.6)";
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.d;
    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  }

  requestAnimationFrame(draw);
}

draw();

</script>

</body>
</html>
