<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0d0d0d;
  color: white;
}

/* Banner */
.banner {
  width: 100%;
  height: auto;
  aspect-ratio: 16 / 6;
  background: url('banner.png') center center / cover no-repeat;
}

/* Profile */
.profile {
  text-align: center;
  margin-top: -60px;
}

.profile img {
  width: 140px;
  border-radius: 50%;
  border: 4px solid #0d0d0d;
  box-shadow: 0 10px 25px rgba(0,0,0,0.6);
}

/* Name */
h1 {
  text-align: center;
  margin: 12px 0 5px;
  font-size: 28px;
}

.tagline {
  text-align: center;
  color: #aaa;
  margin-bottom: 25px;
}

/* Sections */
.section {
  padding: 30px 20px;
  max-width: 800px;
  margin: auto;
}

.section h2 {
  border-bottom: 2px solid #8b5e3c;
  display: inline-block;
  padding-bottom: 5px;
}

/* Links (Premium Buttons) */
.links a {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin: 12px auto;
  padding: 14px;
  width: 260px;
  background: linear-gradient(145deg, #a47148, #8b5e3c);
  color: white;
  text-decoration: none;
  border-radius: 30px;
  font-weight: 500;
  box-shadow: 0 8px 20px rgba(0,0,0,0.4);
  transition: 0.3s;
}

.links a:hover {
  transform: translateY(-3px) scale(1.03);
  background: linear-gradient(145deg, #b07a52, #9c6a44);
}

.links i {
  font-size: 18px;
}

/* YouTube */
.video {
  text-align: center;
}

iframe {
  width: 100%;
  max-width: 560px;
  height: 315px;
  border: none;
  border-radius: 10px;
}

/* Contact */
.contact p {
  color: #ccc;
  margin: 6px 0;
}

footer {
  text-align: center;
  padding: 20px;
  color: #777;
}
</style>
</head>
