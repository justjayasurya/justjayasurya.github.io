<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayasurya</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:#0b0b0f;
  color:white;
  overflow-x:hidden;
}

/* ===== PARTICLES BACKGROUND ===== */
#particles{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background: radial-gradient(circle at top, #1a1a2e, #0b0b0f 60%);
}

/* ===== HERO ===== */
.hero{
  height:420px;
  background:url('banner.png') center/cover no-repeat;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
}

/* ===== PROFILE ===== */
.profile{
  text-align:center;
  margin-top:-70px;
}

.profile img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:3px solid rgba(255,255,255,0.2);
}

h1{
  margin-top:10px;
}

.tagline{
  color:#aaa;
  font-size:14px;
}

/* ===== SUBSCRIBE BUTTON ===== */
.subscribe-btn{
  margin-top:12px;
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:12px 18px;
  border-radius:30px;
  background:#ff0000;
  color:white;
  text-decoration:none;
  font-weight:600;
  box-shadow:0 10px 20px rgba(255,0,0,0.3);
  transition:0.3s;
}

.subscribe-btn:hover{
  transform:scale(1.05);
  background:#e60000;
}

/* ===== SECTIONS ===== */
.section{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:25px;
  backdrop-filter:blur(10px);
}

/* ===== LINKS ===== */
.links{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.links a{
  text-align:center;
  padding:12px;
  border-radius:14px;
  text-decoration:none;
  color:white;
  background:linear-gradient(145deg,#8b5e3c,#c08457);
  transition:0.3s;
}

.links a:hover{
  transform:translateY(-4px);
}

/* ===== VIDEO ===== */
iframe{
  width:100%;
  height:360px;
  border:none;
  border-radius:14px;
}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#111;
  padding:15px;
  border-radius:12px;
  border:1px solid #333;
  display:none;
}

.popup button{
  margin-top:10px;
  padding:8px 12px;
  background:#c08457;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- PARTICLES CANVAS -->
<canvas id="particles"></canvas>

<!-- HERO -->
<div class="hero"></div>

<!-- PROFILE -->
<div class="profile">
  <img src="profile.webp" alt="profile">
  <h1>Jayasurya</h1>
  <p class="tagline">Unmai Makkal 👁️</p>
  <p class="tagline">Politics • Society • Reality Breakdown</p>

  <!-- ✅ YOUTUBE SUBSCRIBE BUTTON -->
  <br>
  <a class="subscribe-btn"
     href="https://www.youtube.com/@justjayasurya?sub_confirmation=1"
     target="_blank">
    <i class="fab fa-youtube"></i>
    Subscribe
  </a>
</div>

<!-- SOCIAL LINKS (UNCHANGED CONTENT STYLE) -->
<div class="section">
  <div class="card">
    <div class="links">
      <a href="https://youtube.com/@justjayasurya"><i class="fab fa-youtube"></i> YouTube</a>
      <a href="https://instagram.com/justjayasurya"><i class="fab fa-instagram"></i> Instagram</a>
      <a href="https://x.com/justjayasurya"><i class="fab fa-x-twitter"></i> X</a>
      <a href="https://t.me/JustjayasuryaOfficial"><i class="fab fa-telegram"></i> Telegram</a>
    </div>
  </div>
</div>

<!-- VIDEO -->
<div class="section">
  <div class="card">
    <iframe src="https://www.youtube.com/embed/oLZQYplu1Gg" allowfullscreen></iframe>
  </div>
</div>

<!-- POPUP -->
<div class="popup" id="popup">
  <b>Subscribe?</b>
  <p style="font-size:12px;color:#aaa;">Get updates from YouTube</p>
  <button onclick="document.getElementById('popup').style.display='none'">Close</button>
</div>

<script>

/* ================= SMOOTHER PARTICLES ================= */
const canvas = document.getElementById("particles");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let particles = [];

for(let i=0;i<100;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    d:Math.random()*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle="rgba(255,255,255,0.6)";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y += p.d + 0.2;
    p.x += Math.sin(p.y*0.01)*0.3;

    if(p.y > canvas.height){
      p.y = 0;
      p.x = Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(draw);
}
draw();

/* ===== POPUP ===== */
setTimeout(()=>{
  document.getElementById("popup").style.display="block";
},5000);

</script>

</body>
</html>
