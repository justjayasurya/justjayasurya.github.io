<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayasurya | Reality Explained</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= BASE ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background: radial-gradient(circle at top, #1a1a2e, #0b0b0f 60%);
  color:white;
  overflow-x:hidden;
}

/* ================= PARTICLES ================= */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-2;
}

/* ================= NAV ================= */
nav{
  position:sticky;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:14px 20px;
  background:rgba(0,0,0,0.4);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(255,255,255,0.12);
  z-index:10;
}

nav h2 span{ color:#c08457; }

/* ================= HERO (FIXED SPACING) ================= */
.hero{
  height:420px;
  background:url('banner.png') center/cover no-repeat;
  position:relative;
  z-index:1;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.95));
}

/* ================= PROFILE (FIXED OVERLAP ISSUE) ================= */
.profile{
  text-align:center;
  margin-top:-60px;   /* reduced overlap */
  position:relative;
  z-index:5;          /* ensures it stays above banner */
}

.profile img{
  width:140px;
  height:140px;
  border-radius:50%;
  border:4px solid rgba(0,0,0,0.8); /* stronger border fixes cut look */
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  background:#111;
}

h1{ margin-top:10px; }

.tagline{ color:#aaa; font-size:14px; }

/* ================= SUBSCRIBE ================= */
.subscribe-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:12px;
  padding:12px 18px;
  border-radius:30px;
  background:#ff0000;
  color:white;
  text-decoration:none;
  font-weight:600;
  transition:0.3s;
}

.subscribe-btn:hover{
  transform:scale(1.05);
  background:#e60000;
}

/* ================= SECTIONS ================= */
.section{
  max-width:900px;
  margin:50px auto;
  padding:0 20px;
  opacity:0;
  transform:translateY(40px);
  transition:1s ease;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

.card{
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.12);
  border-radius:18px;
  padding:25px;
  backdrop-filter:blur(10px);
}

/* ================= LINKS ================= */
.links{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}

.links a{
  text-align:center;
  padding:12px;
  border-radius:14px;
  background:linear-gradient(145deg,#8b5e3c,#c08457);
  color:white;
  text-decoration:none;
  transition:0.3s;
}

.links a:hover{
  transform:translateY(-4px);
}

/* ================= VIDEO ================= */
iframe{
  width:100%;
  height:360px;
  border:none;
  border-radius:14px;
}

/* ================= POPUP (UPDATED BUTTON) ================= */
.popup{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(20,20,20,0.95);
  border:1px solid rgba(255,255,255,0.12);
  padding:15px;
  border-radius:12px;
  display:none;
  z-index:100;
}

.popup button{
  margin-top:10px;
  padding:8px 12px;
  background:#c08457;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- PARTICLES -->
<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
  <h2>Jaya<span>surya</span></h2>
  <i class="fa-solid fa-bolt"></i>
</nav>

<!-- HERO -->
<div class="hero"></div>

<!-- PROFILE -->
<div class="profile">
  <img src="profile.webp" alt="profile">
  <h1>Jayasurya</h1>
  <p class="tagline">Unmai Makkal 👁️</p>
  <p class="tagline">Politics • Society • Reality Breakdown</p>

  <a class="subscribe-btn"
     href="https://www.youtube.com/@justjayasurya?sub_confirmation=1"
     target="_blank">
    <i class="fab fa-youtube"></i>
    Subscribe
  </a>
</div>

<!-- SOCIAL -->
<div class="section">
  <div class="card">
    <div class="links">

      <a href="https://youtube.com/@justjayasurya" target="_blank">
        <i class="fab fa-youtube"></i> YouTube
      </a>

      <a href="https://spotify.com" target="_blank">
        <i class="fab fa-spotify"></i> Spotify
      </a>

      <a href="https://instagram.com/justjayasurya" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
      </a>

      <a href="https://www.facebook.com/jayasurya.jayasurya.9216778/" target="_blank">
        <i class="fab fa-facebook"></i> Facebook
      </a>

      <a href="https://x.com/justjayasurya" target="_blank">
        <i class="fab fa-x-twitter"></i> X</a>

      <a href="https://t.me/JustjayasuryaOfficial" target="_blank">
        <i class="fab fa-telegram"></i> Telegram
      </a>

      <a href="#" target="_blank">
        <i class="fab fa-pinterest"></i> Pinterest
      </a>

    </div>
  </div>
</div>

<!-- VIDEO -->
<div class="section">
  <div class="card">
    <iframe src="https://www.youtube.com/embed/oLZQYplu1Gg" allowfullscreen></iframe>
  </div>
</div>

<!-- POPUP FIXED -->
<div class="popup" id="popup">
  <b>🔥 Subscribe?</b>
  <p style="font-size:12px;color:#aaa;">Stay updated on new videos</p>
  <button onclick="closePopup()">Got it</button>
</div>

<script>

/* scroll animation */
const sections=document.querySelectorAll('.section');

window.addEventListener('scroll',()=>{
  sections.forEach(s=>{
    if(s.getBoundingClientRect().top < window.innerHeight-100){
      s.classList.add('show');
    }
  });
});

/* particles */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");

function resize(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let particles=[];

for(let i=0;i<90;i++){
  particles.push({
    x:Math.random()*canvas.width,
    y:Math.random()*canvas.height,
    r:Math.random()*2,
    s:Math.random()*0.5+0.2
  });
}

function animate(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle="rgba(255,255,255,0.6)";

  particles.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fill();

    p.y+=p.s;
    p.x+=Math.sin(p.y*0.01)*0.3;

    if(p.y>canvas.height){
      p.y=0;
      p.x=Math.random()*canvas.width;
    }
  });

  requestAnimationFrame(animate);
}
animate();

/* popup */
setTimeout(()=>{
  document.getElementById("popup").style.display="block";
},5000);

function closePopup(){
  document.getElementById("popup").style.display="none";
}

</script>

</body>
</html>
