<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jayasurya | Official</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

/* ================= BASE ================= */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Poppins, sans-serif;
}

body{
  background:#0b0b0f;
  color:white;
  overflow-x:hidden;
}

/* ================= NAV ================= */
nav{
  display:flex;
  justify-content:space-between;
  padding:14px 20px;
  background:rgba(0,0,0,0.6);
  backdrop-filter:blur(10px);
  position:sticky;
  top:0;
  z-index:10;
}

nav a{
  color:#aaa;
  text-decoration:none;
  margin-left:15px;
}

/* ================= HERO ================= */
.hero{
  height:380px;
  background:url('banner.png') center/cover;
  position:relative;
}

.hero::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to bottom,transparent,#0b0b0f);
}

/* ================= PROFILE ================= */
.profile{
  text-align:center;
  margin-top:-70px;
}

.profile img{
  width:130px;
  height:130px;
  border-radius:50%;
  border:3px solid #333;
}

h1{ margin-top:10px; }

.tag{
  color:#aaa;
  font-size:14px;
}

/* ================= BUTTON ================= */
.btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  margin-top:10px;
  padding:12px 18px;
  border-radius:30px;
  background:#ff0000;
  color:white;
  text-decoration:none;
  font-weight:600;
}

/* ================= LINKS ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
  gap:10px;
  padding:20px;
  max-width:800px;
  margin:auto;
}

.grid a{
  background:#1c1c1c;
  padding:12px;
  border-radius:10px;
  text-align:center;
  color:white;
  text-decoration:none;
}

/* ================= SECTIONS ================= */
.section{
  display:none;
  padding:20px;
  max-width:800px;
  margin:auto;
}

.active{
  display:block;
}

/* ================= CARD ================= */
.card{
  background:#1c1c1c;
  padding:15px;
  margin:10px 0;
  border-radius:10px;
}

/* ================= ADMIN ================= */
input,textarea{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:6px;
  border:none;
}

button{
  padding:10px 15px;
  background:#c08457;
  border:none;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

/* ================= PARTICLES ================= */
#particles{
  position:fixed;
  width:100%;
  height:100%;
  z-index:-1;
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- NAV -->
<nav>
  <div>Jayasurya</div>
  <div>
    <a href="#" onclick="show('home')">Home</a>
    <a href="#" onclick="show('about')">About</a>
    <a href="#" onclick="openAdmin()">Admin</a>
  </div>
</nav>

<!-- HERO -->
<div class="hero"></div>

<!-- PROFILE -->
<div class="profile">
  <img src="profile.webp">
  <h1>Jayasurya</h1>
  <p class="tag">Politics • Society • Reality Breakdown</p>

  <a class="btn" href="https://www.youtube.com/@justjayasurya?sub_confirmation=1" target="_blank">
    <i class="fab fa-youtube"></i> Subscribe
  </a>
</div>

<!-- HOME -->
<div id="home" class="section active">

  <h2 style="text-align:center;">Social Links</h2>

  <div class="grid">
    <a href="https://instagram.com/justjayasurya">Instagram</a>
    <a href="https://x.com/justjayasurya">X</a>
    <a href="https://t.me/JustjayasuryaOfficial">Telegram</a>
    <a href="https://spotify.com">Spotify</a>
  </div>

  <h2 style="text-align:center;">Latest Posts</h2>
  <div id="posts"></div>

</div>

<!-- ABOUT -->
<div id="about" class="section">
  <h2>About Me</h2>
  <p style="color:#aaa;line-height:1.7;">
    I simplify politics, society and real-world systems.
    I break down what people don’t understand in simple form.
  </p>
</div>

<!-- ADMIN (hidden popup style) -->
<div id="admin" class="section">

  <h2>Admin Panel</h2>

  <input id="title" placeholder="Title">
  <textarea id="content" placeholder="Content"></textarea>
  <button onclick="savePost()">Publish</button>

  <h3 style="margin-top:20px;">All Posts</h3>
  <div id="adminPosts"></div>

</div>

<script>

/* ================= PAGE SWITCH ================= */
function show(page){
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

/* ================= ADMIN LOGIN ================= */
function openAdmin(){
  let pass = prompt("Enter Admin Password:");
  if(pass === "1234"){
    show('admin');
    loadAdmin();
  } else {
    alert("Wrong password");
  }
}

/* ================= STORAGE ================= */
function getPosts(){
  return JSON.parse(localStorage.getItem("posts") || "[]");
}

function savePosts(posts){
  localStorage.setItem("posts", JSON.stringify(posts));
}

/* ================= SAVE POST ================= */
function savePost(){
  let title = document.getElementById("title").value;
  let content = document.getElementById("content").value;

  let posts = getPosts();
  posts.push({title, content});

  savePosts(posts);

  loadHome();
  loadAdmin();
}

/* ================= LOAD HOME POSTS ================= */
function loadHome(){
  let posts = getPosts();
  let html = "";

  posts.slice().reverse().forEach(p=>{
    html += `
      <div class="card">
        <b>${p.title}</b>
        <p style="color:#aaa">${p.content}</p>
      </div>
    `;
  });

  document.getElementById("posts").innerHTML = html;
}

/* ================= LOAD ADMIN POSTS ================= */
function loadAdmin(){
  let posts = getPosts();
  let html = "";

  posts.slice().reverse().forEach(p=>{
    html += `
      <div class="card">
        <b>${p.title}</b>
        <p>${p.content}</p>
      </div>
    `;
  });

  document.getElementById("adminPosts").innerHTML = html;
}

loadHome();

/* ================= PARTICLES ================= */
const c = document.getElementById("particles");
const ctx = c.getContext("2d");
c.width = window.innerWidth;
c.height = window.innerHeight;

let dots = [];

for(let i=0;i<60;i++){
  dots.push({
    x:Math.random()*c.width,
    y:Math.random()*c.height,
    r:Math.random()*2
  });
}

function draw(){
  ctx.clearRect(0,0,c.width,c.height);
  ctx.fillStyle="white";

  dots.forEach(d=>{
    ctx.beginPath();
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();

    d.y += 0.4;
    if(d.y > c.height) d.y = 0;
  });

  requestAnimationFrame(draw);
}
draw();

</script>

</body>
</html>
